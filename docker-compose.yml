# Local infrastructure + the recommend app (T10).
#
#   cp .env.example .env      # then fill in ANTHROPIC_* and TELEGRAM_*
#   docker compose up         # migrations apply, then the app serves + schedules
#
# In demo mode (default here) prices come from the committed seed CSV and news
# is skipped, so only Anthropic + Telegram need real credentials; a seeded
# anomaly flows to your Telegram chat within a minute or two. For the immediate,
# one-shot version:  docker compose run --rm app python -m hodlin_recommend.demo
#
# Integration tests still use just the db service:
#   docker compose up -d db
#   HODLIN_TEST_DATABASE_URL=postgresql+asyncpg://hodlin:hodlin@localhost:5432/hodlin \
#     uv run pytest tests/integration
services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: hodlin
      POSTGRES_PASSWORD: hodlin
      POSTGRES_DB: hodlin
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hodlin -d hodlin"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      # pg18+ wants a single mount here (data lands in a version subdir), not
      # at /var/lib/postgresql/data — see docker-library/postgres#1259. If you
      # have a pre-existing hodlin_pgdata volume from the old path, reset it
      # once with `docker compose down -v`.
      - hodlin_pgdata:/var/lib/postgresql

  app:
    build:
      context: .
      dockerfile: packages/recommend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Reach Postgres by its compose service name, and override the loopback
      # bind + provider selection for the containerised demo. These win over
      # whatever .env carries.
      DATABASE_URL: postgresql+asyncpg://hodlin:hodlin@db:5432/hodlin
      HOST: 0.0.0.0
      PORT: "8000"
      DEMO_MODE: "true"  # demo harness — drop this line to run live providers
    ports:
      - "8000:8000"
    volumes:
      # Persist the FinBERT weights (~440 MB) so only the first boot downloads.
      - hodlin_models:/models
    healthcheck:
      # python is always present; curl/wget are not in the slim image. 503 (not
      # ready) raises, so the container stays "starting" until deps are up.
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 240s  # first boot loads/downloads the model before serving

volumes:
  hodlin_pgdata:
  hodlin_models:
