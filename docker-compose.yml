# Local infrastructure for development and integration tests.
#
# For now this provides Postgres only; the recommend app service is added in
# T10. Bring the database up and point the test suite at it:
#
#   docker compose up -d db
#   HODLIN_TEST_DATABASE_URL=postgresql+asyncpg://hodlin:hodlin@localhost:5432/hodlin \
#     uv run pytest tests/integration
services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: hodlin
      POSTGRES_PASSWORD: hodlin
      POSTGRES_DB: hodlin
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hodlin -d hodlin"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - hodlin_pgdata:/var/lib/postgresql/data

volumes:
  hodlin_pgdata:
