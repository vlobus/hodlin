[project]
name = "hodlin-recommend"
version = "0.1.0"
description = "Recommend domain: intelligence only, holds no keys and moves no money"
requires-python = ">=3.14"
dependencies = [
    "hodlin-contracts",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hodlin_recommend"]

[tool.uv.sources]
hodlin-contracts = { workspace = true }