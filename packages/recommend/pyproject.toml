[project]
name = "hodlin-recommend"
version = "0.1.0"
description = "Recommend domain: intelligence only, holds no keys and moves no money"
requires-python = ">=3.14"
dependencies = [
    "hodlin-contracts",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.30",
    "alembic>=1.14",
    "pydantic-settings>=2.7",
    "httpx>=0.28",
    "tenacity>=9.0",
    "aiolimiter>=1.2",
    "fastapi>=0.115",
    "transformers>=4.48",
    "torch>=2.6",
    "uvicorn>=0.34",
    "anthropic>=0.40",
    "apscheduler>=3.10,<4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hodlin_recommend"]

[tool.uv.sources]
hodlin-contracts = { workspace = true }
