[project]
name = "hodlin-execute"
version = "0.1.0"
description = "Execute domain: holds authority, verifies tokens, builds transactions (stub in M1)"
requires-python = ">=3.14"
dependencies = [
    "hodlin-contracts",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hodlin_execute"]

[tool.uv.sources]
hodlin-contracts = { workspace = true }
