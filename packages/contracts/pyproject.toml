[project]
name = "hodlin-contracts"
version = "0.1.0"
description = "Shared, frozen contracts (Proposal, canonical hash) imported by both domains"
requires-python = ">=3.14"
dependencies = [
    "pydantic>=2.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hodlin_contracts"]
